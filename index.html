<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f1e8">
<title>知の階層メモ</title>
<style>
  :root{
    --paper:#f4f1e8;--paper-card:#faf8f1;--side:#ebe6d8;--side-hover:#e2dccb;
    --line:#d8d0bd;--line-soft:#e4ddcc;--ink:#2c2a24;--ink-soft:#6b665a;--ink-faint:#9b9484;
    --accent:#8a5a2b;--accent-soft:#b88a52;--accent-bg:#ece2cf;
    --danger:#9a3b2e;--danger-bg:#f2dcd6;--ok:#4a6b3f;
    --link:#2a5a8a;--link-bg:#e8f0f8;
    --shadow:0 1px 2px rgba(44,42,36,.06),0 4px 14px rgba(44,42,36,.05);
    --radius:7px;--side-w:286px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(0deg,rgba(140,120,80,.012) 0 1px,transparent 1px 3px);opacity:.6;}
  button,input,textarea{font-family:inherit;color:inherit;}
  button{cursor:pointer;border:none;background:none;}

  #app{display:flex;height:var(--app-h,100vh);position:relative;z-index:1;}

  /* ===== サイドバー ===== */
  #sidebar{width:var(--side-w);flex:0 0 var(--side-w);background:var(--side);
    border-right:1px solid var(--line);display:flex;flex-direction:column;height:var(--app-h,100vh);}
  #side-head{padding:14px 16px 10px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:8px;}
  #side-head .logo{font-size:17px;font-weight:600;letter-spacing:.14em;color:var(--ink);}
  #side-head .ver{font-size:10px;color:var(--ink-faint);letter-spacing:.1em;}

  /* 検索窓 */
  #search-wrap{padding:8px 10px;border-bottom:1px solid var(--line-soft);position:relative;}
  #search-input{width:100%;height:32px;border:1px solid var(--line);border-radius:6px;
    background:var(--paper-card);padding:0 30px 0 10px;font-size:13px;color:var(--ink);outline:none;}
  #search-input:focus{border-color:var(--accent-soft);}
  #search-input::placeholder{color:var(--ink-faint);}
  #search-clear{position:absolute;right:16px;top:50%;transform:translateY(-50%);
    display:none;width:22px;height:22px;border-radius:50%;background:var(--ink-faint);
    color:#fff;font-size:13px;align-items:center;justify-content:center;}
  #search-clear.show{display:flex;}

  /* 検索結果 */
  #search-results{flex:1 1 auto;overflow-y:auto;padding:4px 6px 90px;}
  #search-results::-webkit-scrollbar{width:8px;}
  #search-results::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .sr-item{padding:9px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink);margin:1px 0;}
  .sr-item:hover{background:var(--side-hover);}
  .sr-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-snippet{font-size:11.5px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-hit{background:rgba(138,90,43,.18);border-radius:2px;padding:0 1px;}
  .sr-empty{padding:20px 14px;text-align:center;color:var(--ink-faint);font-size:12.5px;}

  #tree-wrap{flex:1 1 auto;overflow-y:auto;padding:6px 6px 90px;}
  #tree-wrap::-webkit-scrollbar{width:8px;}
  #tree-wrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .node-row{display:flex;align-items:center;gap:2px;border-radius:5px;margin:1px 0;
    font-size:13.5px;line-height:1.3;color:var(--ink);transition:background .12s;position:relative;}
  .node-row:hover{background:var(--side-hover);}
  .node-row.active{background:var(--accent-bg);}
  .node-row.active::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:3px;border-radius:2px;background:var(--accent);}
  .node-row.drop-target{box-shadow:inset 0 0 0 1.5px var(--accent-soft);border-radius:5px;}
  .twist{flex:0 0 18px;width:18px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:10px;user-select:none;}
  .twist.empty{visibility:hidden;}
  .twist svg{transition:transform .15s;}
  .node-row.collapsed .twist svg{transform:rotate(-90deg);}
  .node-title{flex:1 1 auto;padding:6px 4px 6px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .node-title.untitled{color:var(--ink-faint);font-style:italic;}
  .node-mini{flex:0 0 auto;display:flex;gap:1px;opacity:0;transition:opacity .12s;padding-right:4px;}
  .node-row:hover .node-mini,.node-row.active .node-mini{opacity:1;}
  .node-mini button{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
  .node-mini button:hover{background:rgba(0,0,0,.07);color:var(--ink);}
  .node-mini button:active{transform:scale(.92);}
  .empty-hint{padding:24px 16px;color:var(--ink-faint);font-size:12.5px;line-height:1.8;text-align:center;}

  #side-foot{position:absolute;left:0;bottom:0;width:var(--side-w);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--side) 70%,transparent);display:flex;gap:8px;}
  .btn-new{flex:1 1 auto;height:42px;border-radius:var(--radius);background:var(--accent);color:#f7f0e2;
    font-size:14px;letter-spacing:.08em;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;
    box-shadow:var(--shadow);transition:transform .1s,filter .1s;}
  .btn-new:hover{filter:brightness(1.06);}
  .btn-new:active{transform:translateY(1px);}
  .btn-icon-sq{flex:0 0 42px;width:42px;height:42px;border-radius:var(--radius);background:var(--paper-card);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);box-shadow:var(--shadow);}
  .btn-icon-sq:hover{background:#fff;color:var(--ink);}
  .btn-icon-sq:active{transform:translateY(1px);}

  /* ===== 本文 ===== */
  #main{flex:1 1 auto;display:flex;flex-direction:column;height:var(--app-h,100vh);background:var(--paper-card);min-width:0;}
  #topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line-soft);background:var(--paper-card);}
  #btn-menu{display:none;}
  #crumb{flex:1 1 auto;min-width:0;font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;}
  #crumb .sep{color:var(--ink-faint);margin:0 5px;}
  #crumb .cur{color:var(--ink);}
  #topbar .tb-btn{flex:0 0 auto;height:32px;padding:0 11px;border-radius:6px;font-size:12.5px;color:var(--ink-soft);border:1px solid transparent;display:flex;align-items:center;gap:5px;}
  #topbar .tb-btn:hover{background:var(--side-hover);color:var(--ink);}
  #topbar .tb-btn.danger:hover{background:var(--danger-bg);color:var(--danger);}

  #editor-area{flex:1 1 auto;overflow-y:auto;}
  #editor-inner{max-width:760px;margin:0 auto;padding:26px 34px 140px;}
  /* 編集中はツールバー(約54px)＋キーボードぶん下に余白を足し、最終行が隠れないようにする */
  body.rt-active #editor-inner{padding-bottom:calc(140px + var(--kb-inset,0px));}
  #title-input{width:100%;border:none;background:transparent;outline:none;font-size:27px;font-weight:600;letter-spacing:.02em;color:var(--ink);padding:0 0 8px;line-height:1.35;}
  #title-input::placeholder{color:var(--ink-faint);font-weight:600;}
  #title-rule{height:1px;background:var(--line-soft);margin:4px 0 10px;}
  #char-count-wrap{text-align:right;font-size:11px;color:var(--ink-faint);letter-spacing:.05em;margin-bottom:8px;}

  /* 本文（リッチテキスト contenteditable） */
  #body-input{width:100%;border:none;background:transparent;outline:none;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:15.5px;line-height:2.05;letter-spacing:.015em;color:var(--ink);min-height:60vh;word-break:break-word;white-space:pre-wrap;}
  #body-input:empty::before{content:attr(data-placeholder);color:var(--ink-faint);pointer-events:none;}
  #body-input u{text-decoration-thickness:1px;text-underline-offset:2px;}
  /* 本文内の画像（サムネイル表示・タップで拡大） */
  #body-input img.rt-img{max-width:min(280px,70%);height:auto;border-radius:8px;
    border:1px solid var(--line);margin:6px 0;display:inline-block;vertical-align:middle;cursor:zoom-in;box-shadow:var(--shadow);}
  /* 本文内の装飾は font/span で表現される */

  /* 画像の拡大ビュー（フルスクリーン） */
  #img-viewer{position:fixed;inset:0;z-index:300;background:rgba(20,18,14,.92);
    display:none;align-items:center;justify-content:center;padding:16px;
    padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:calc(16px + env(safe-area-inset-bottom));}
  #img-viewer.show{display:flex;}
  #img-viewer img{max-width:100%;max-height:100%;border-radius:6px;object-fit:contain;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  #img-viewer .iv-close{position:absolute;top:calc(12px + env(safe-area-inset-top));right:16px;
    width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:22px;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.25);}

  /* ===== リッチ編集ツールバー（本文編集中、キーボードの真上に追従） ===== */
  /* JS(visualViewport)が算出した「キーボード上端からの距離」を --kb-inset に入れ、
     ツールバーをその位置に固定する。キーボードが無い時(PC等)は最下部に貼り付く。 */
  #rt-toolbar{position:fixed;left:0;right:0;bottom:var(--kb-inset,0px);z-index:60;display:none;
    background:var(--paper-card);border-top:1px solid var(--line);
    box-shadow:0 -4px 14px rgba(44,42,36,.10);
    padding:6px calc(8px + env(safe-area-inset-left)) 6px calc(8px + env(safe-area-inset-right));
    transition:bottom .12s ease-out;}
  body.rt-active #rt-toolbar{display:block;}
  #rt-scroll{display:flex;align-items:center;gap:5px;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;padding:1px 2px;}
  #rt-scroll::-webkit-scrollbar{display:none;}
  .rt-btn{flex:0 0 auto;min-width:44px;height:42px;padding:0 6px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);background:var(--paper);border:1px solid var(--line-soft);font-size:17px;transition:background .1s,color .1s,transform .08s;}
  .rt-btn:active{transform:scale(.92);}
  .rt-btn.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-soft);}
  .rt-btn .ul{text-decoration:underline;text-underline-offset:2px;}
  .rt-btn .st{text-decoration:line-through;}
  /* 「閉じる(完了)」ボタン：編集を確定してツールバーを隠す */
  #rt-done{margin-left:auto;flex:0 0 auto;min-width:54px;height:42px;border-radius:7px;
    background:var(--accent);color:#f7f0e2;font-size:13px;letter-spacing:.06em;border:none;
    display:flex;align-items:center;justify-content:center;}
  .rt-sep{flex:0 0 auto;width:1px;height:24px;background:var(--line);margin:0 3px;}
  .rt-swatch{position:relative;}
  .rt-swatch .dot{position:absolute;left:50%;bottom:5px;transform:translateX(-50%);width:18px;height:3px;border-radius:2px;background:var(--accent);}
  .rt-swatch.mk .dot{height:6px;border-radius:2px;}

  /* 色パレット（ボタンの下にポップアップ） */
  #rt-palette{position:fixed;z-index:61;display:none;background:var(--paper-card);
    border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(44,42,36,.22);
    padding:9px;gap:8px;flex-wrap:wrap;width:208px;}
  #rt-palette.show{display:flex;}
  .pal-chip{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,.12);
    cursor:pointer;transition:transform .08s;position:relative;}
  .pal-chip:active{transform:scale(.9);}
  .pal-chip.none{background:#fff;display:flex;align-items:center;justify-content:center;}
  .pal-chip.none::after{content:"";position:absolute;left:50%;top:50%;width:34px;height:1.5px;background:var(--danger);transform:translate(-50%,-50%) rotate(-45deg);}
  .pal-chip.picker{background:conic-gradient(red,orange,yellow,lime,cyan,blue,magenta,red);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .pal-chip.picker input{opacity:0;width:100%;height:100%;cursor:pointer;border:none;padding:0;}

  #save-state{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));right:18px;z-index:30;font-size:11px;color:var(--ink-faint);letter-spacing:.05em;
    background:rgba(244,241,232,.88);padding:4px 10px;border-radius:20px;border:1px solid var(--line-soft);transition:opacity .4s;pointer-events:none;opacity:0;}

  #empty-state{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--ink-faint);text-align:center;padding:30px;}
  #empty-state .es-mark{font-size:40px;opacity:.5;}
  #empty-state .es-title{font-size:16px;color:var(--ink-soft);letter-spacing:.08em;}
  #empty-state .es-sub{font-size:12.5px;line-height:1.9;}

  /* ===== モーダル ===== */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(44,42,36,.4);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .18s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .modal{width:100%;max-width:440px;max-height:84vh;overflow:hidden;background:var(--paper-card);border-radius:12px;border:1px solid var(--line);box-shadow:0 18px 50px rgba(44,42,36,.3);display:flex;flex-direction:column;transform:translateY(8px) scale(.98);transition:transform .18s;}
  .overlay.show .modal{transform:none;}
  .modal h3{margin:0;padding:18px 22px 12px;font-size:16px;font-weight:600;letter-spacing:.06em;color:var(--ink);border-bottom:1px solid var(--line-soft);}
  .modal .m-body{padding:16px 22px;overflow-y:auto;font-size:13.5px;line-height:1.85;color:var(--ink-soft);}
  .modal .m-foot{padding:12px 22px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--line-soft);flex-wrap:wrap;}
  .m-btn{height:40px;padding:0 18px;border-radius:7px;font-size:13.5px;letter-spacing:.04em;border:1px solid var(--line);background:var(--paper);color:var(--ink);transition:filter .1s,transform .08s;}
  .m-btn:hover{filter:brightness(.97);}
  .m-btn:active{transform:translateY(1px);}
  .m-btn.primary{background:var(--accent);color:#f7f0e2;border-color:var(--accent);}
  .m-btn.danger{background:var(--danger);color:#f7eae7;border-color:var(--danger);}

  .move-list{display:flex;flex-direction:column;gap:2px;}
  .move-item{display:flex;align-items:center;gap:7px;width:100%;padding:9px 10px;border-radius:6px;font-size:13.5px;text-align:left;color:var(--ink);transition:background .1s;}
  .move-item:hover{background:var(--side-hover);}
  .move-item.disabled{color:var(--ink-faint);pointer-events:none;opacity:.5;}
  .move-item .mv-depth{color:var(--ink-faint);}
  .move-item.is-current{font-weight:600;}

  .trash-item{display:flex;align-items:center;gap:10px;padding:11px 8px;border-bottom:1px solid var(--line-soft);}
  .trash-item:last-child{border-bottom:none;}
  .trash-meta{flex:1 1 auto;min-width:0;}
  .trash-meta .tt{font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .trash-meta .ti{font-size:11px;color:var(--ink-faint);margin-top:2px;}
  .trash-acts{display:flex;gap:6px;flex:0 0 auto;}
  .trash-acts button{height:30px;padding:0 10px;border-radius:6px;font-size:12px;border:1px solid var(--line);background:var(--paper);}
  .trash-acts .restore:hover{background:#e3ecdd;color:var(--ok);border-color:#c2d3b8;}
  .trash-acts .purge:hover{background:var(--danger-bg);color:var(--danger);border-color:#e0bdb4;}

  .stor-line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line-soft);}
  .stor-line:last-child{border-bottom:none;}
  .stor-line .k{color:var(--ink-soft);}
  .stor-line .v{color:var(--ink);}
  .badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;letter-spacing:.05em;}
  .badge.ok{background:#e3ecdd;color:var(--ok);}
  .badge.warn{background:#f4e6cf;color:#8a5a2b;}
  .hint-box{background:var(--paper);border:1px solid var(--line-soft);border-radius:8px;padding:11px 13px;margin-top:10px;font-size:12px;line-height:1.75;color:var(--ink-soft);}
  .hint-box b{color:var(--ink);}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:200;background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:24px;font-size:13px;letter-spacing:.04em;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .rename-input{flex:1 1 auto;min-width:0;margin:3px 4px 3px 0;height:26px;padding:0 6px;border-radius:5px;border:1px solid var(--accent-soft);background:#fff;font-size:13.5px;outline:none;}

  @media (max-width:760px){
    :root{--side-w:84vw;}
    #sidebar{position:fixed;z-index:50;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .22s;box-shadow:6px 0 28px rgba(44,42,36,.18);max-width:340px;height:var(--app-h,100vh);}
    body.nav-open #sidebar{transform:translateX(0);}
    #side-foot{width:var(--side-w);max-width:340px;}
    #scrim{position:fixed;inset:0;z-index:45;background:rgba(44,42,36,.35);opacity:0;pointer-events:none;transition:opacity .2s;}
    body.nav-open #scrim{opacity:1;pointer-events:auto;}
    #btn-menu{display:flex;}
    #main{width:100%;}
    #editor-inner{padding:20px 18px 120px;}
    #title-input{font-size:23px;}
    #body-input{font-size:16px;line-height:2;}
    #topbar .tb-btn .lbl{display:none;}
  }
  @media (min-width:761px){#scrim{display:none;}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="side-head"><span class="logo">知の階層メモ</span><span class="ver">v4.0</span></div>
    <div id="search-wrap">
      <input id="search-input" type="search" placeholder="🔍 検索…" autocomplete="off">
      <button id="search-clear" title="クリア">×</button>
    </div>
    <div id="search-results" style="display:none;"></div>
    <div id="tree-wrap"></div>
    <div id="side-foot">
      <button class="btn-new" id="btn-new-root">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>新規ページ
      </button>
      <button class="btn-icon-sq" id="btn-trash" title="ゴミ箱">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6"/></svg>
      </button>
      <button class="btn-icon-sq" id="btn-storage" title="保存とバックアップ">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M8 4v5h7"/></svg>
      </button>
    </div>
  </aside>
  <div id="scrim"></div>

  <main id="main">
    <div id="topbar">
      <button class="tb-btn" id="btn-menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div id="crumb"></div>
      <button class="tb-btn" id="btn-move" title="移動"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg><span class="lbl">移動</span></button>

<script>
"use strict";
/* 知の階層メモ Ver4.0 — リッチテキスト対応（本文をHTMLで保存） */
const DB_NAME='kaiso_memo_db',DB_VER=1,STORE='pages',APP_TAG='kaiso_memo';
let _db=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=(e)=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        const os=db.createObjectStore(STORE,{keyPath:'id'});
        os.createIndex('parentId','parentId',{unique:false});
      }
    };
    req.onsuccess=()=>{_db=req.result;resolve(_db);};
    req.onerror=()=>reject(req.error);
  });
}
function tx(mode){return _db.transaction(STORE,mode).objectStore(STORE);}
function dbGetAll(){return new Promise((res,rej)=>{const r=tx('readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function dbPut(rec){return new Promise((res,rej)=>{const r=tx('readwrite').put(rec);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbBulkPut(recs){return new Promise((res,rej)=>{const t=_db.transaction(STORE,'readwrite'),os=t.objectStore(STORE);recs.forEach(r=>os.put(r));t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function dbBulkDelete(ids){return new Promise((res,rej)=>{const t=_db.transaction(STORE,'readwrite'),os=t.objectStore(STORE);ids.forEach(id=>os.delete(id));t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function dbClearAll(){return new Promise((res,rej)=>{const r=tx('readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

let pages=[],currentId=null,collapsed=new Set();

function uid(){return 'p_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);}
function byId(id){return pages.find(p=>p.id===id)||null;}
function liveChildren(pid){return pages.filter(p=>p.parentId===pid&&!p.deletedAt).sort((a,b)=>(a.order-b.order)||(a.createdAt-b.createdAt));}

function isSelfOrDescendant(targetId,nodeId){
  if(targetId===nodeId)return true;
  let cur=byId(targetId),guard=0;
  while(cur&&cur.parentId!==null&&guard<10000){if(cur.parentId===nodeId)return true;cur=byId(cur.parentId);guard++;}
  return false;
}
function collectSubtree(id){
  const out=[id],stack=[id];let guard=0;
  while(stack.length&&guard<100000){const cur=stack.pop();pages.forEach(p=>{if(p.parentId===cur&&!p.deletedAt){out.push(p.id);stack.push(p.id);}});guard++;}
  return out;
}

/* ===== リッチ本文のサニタイズ ===== */
/* 許可するタグと属性だけを残し、危険なものを除去（XSS対策） */
const ALLOWED_TAGS=new Set(['B','STRONG','U','S','STRIKE','SPAN','FONT','BR','DIV','P','IMG']);
const DROP_WHOLE=new Set(['SCRIPT','STYLE','NOSCRIPT','IFRAME','OBJECT','EMBED','TEMPLATE']);
function sanitizeHtml(html){
  const tpl=document.createElement('template');
  tpl.innerHTML=html||'';
  const walk=(node)=>{
    // 子から逆順に処理（削除しても添字がずれない）
    const children=Array.from(node.childNodes);
    for(const child of children){
      if(child.nodeType===1){ // 要素
        const tag=child.tagName;
        if(DROP_WHOLE.has(tag)){
          // 危険要素は中身ごと完全に捨てる
          node.removeChild(child);
          continue;
        }
        if(!ALLOWED_TAGS.has(tag)){
          // 許可外タグは中身（テキスト）だけ残して殻を外す
          while(child.firstChild)node.insertBefore(child.firstChild,child);
          node.removeChild(child);
          continue;
        }
        // 属性の精査：style(color/background-color)とcolorのみ許可
        if(tag==='IMG'){
          // 画像は data:image/ で始まるsrcのみ許可（外部URL・javascript:等は除去）
          const src=child.getAttribute('src')||'';
          Array.from(child.attributes).forEach(attr=>{child.removeAttribute(attr.name);});
          if(/^data:image\//i.test(src)){
            child.setAttribute('src',src);
            child.setAttribute('class','rt-img');
          } else {
            // 不正なsrcの画像は丸ごと除去
            node.removeChild(child);
            continue;
          }
          // imgは子を持たないのでwalk不要
          continue;
        }
        Array.from(child.attributes).forEach(attr=>{
          const n=attr.name.toLowerCase();
          if(n==='style'){
            const safe=[];
            child.style.color && safe.push('color:'+child.style.color);
            child.style.backgroundColor && safe.push('background-color:'+child.style.backgroundColor);
            if(safe.length)child.setAttribute('style',safe.join(';'));
            else child.removeAttribute('style');
          } else if(n==='color' && tag==='FONT'){
            /* font color はそのまま許可 */
          } else {
            child.removeAttribute(attr.name);
          }
        });
        walk(child);
      } else if(child.nodeType===8){ // コメント除去
        node.removeChild(child);
      }
    }
  };
  walk(tpl.content);
  return tpl.innerHTML;
}
/* HTMLからプレーン文字列（検索・文字数カウント用） */
function htmlToText(html){
  const tpl=document.createElement('template');
  tpl.innerHTML=(html||'').replace(/<br\s*\/?>/gi,'\n').replace(/<\/(div|p)>/gi,'\n');
  return (tpl.content.textContent||'').replace(/\u00a0/g,' ');
}

/* ===== ページ操作 ===== */
async function createPage(parentId){
  const now=Date.now();
  const sibs=liveChildren(parentId);
  const maxOrder=sibs.reduce((m,s)=>Math.max(m,s.order||0),0);
  const rec={id:uid(),parentId:parentId||null,title:'',body:'',order:maxOrder+1,createdAt:now,updatedAt:now,deletedAt:null};
  pages.push(rec);await dbPut(rec);
  if(parentId)collapsed.delete(parentId);
  currentId=rec.id;renderTree();openEditor(rec.id,true);
}
async function softDelete(id){
  const ids=collectSubtree(id);const now=Date.now();const changed=[];
  ids.forEach(pid=>{const p=byId(pid);if(p&&!p.deletedAt){p.deletedAt=now;p.updatedAt=now;changed.push(p);}});
  await dbBulkPut(changed);
  if(ids.includes(currentId)){currentId=null;showEmpty();}
  renderTree();toast(changed.length>1?`${changed.length}件をゴミ箱へ移しました`:'ゴミ箱へ移しました');
}
async function restorePage(id){
  const p=byId(id);if(!p)return;
  const parent=p.parentId?byId(p.parentId):null;
  if(p.parentId&&(!parent||parent.deletedAt))p.parentId=null;
  p.deletedAt=null;p.updatedAt=Date.now();
  await dbPut(p);renderTree();renderTrash();toast('復元しました');
}
async function purgePage(id){
  const targets=[],stack=[id];let guard=0;
  while(stack.length&&guard<100000){const cur=stack.pop();targets.push(cur);pages.forEach(p=>{if(p.parentId===cur)stack.push(p.id);});guard++;}
  await dbBulkDelete(targets);
  pages=pages.filter(p=>!targets.includes(p.id));
  renderTrash();renderTree();
}
async function emptyTrash(){
  const ids=pages.filter(p=>p.deletedAt).map(p=>p.id);
  await dbBulkDelete(ids);
  pages=pages.filter(p=>!p.deletedAt);
  renderTrash();renderTree();toast('ゴミ箱を空にしました');
}
async function movePage(id,newParentId){
  if(newParentId!==null&&isSelfOrDescendant(newParentId,id)){toast('そこへは移動できません');return;}
  const p=byId(id);if(!p)return;
  const sibs=liveChildren(newParentId).filter(s=>s.id!==id);
  const maxOrder=sibs.reduce((m,s)=>Math.max(m,s.order||0),0);
  p.parentId=newParentId;p.order=maxOrder+1;p.updatedAt=Date.now();
  await dbPut(p);
  if(newParentId)collapsed.delete(newParentId);
  renderTree();toast('移動しました');
}

/* ===== 自動保存 ===== */
let saveTimer=null,saveStateTimer=null;
function scheduleSave(){
  const id=currentId;if(!id)return;
  showSaveState('保存中…',true);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const p=byId(id);if(!p)return;
    p.title=titleInput.value;p.body=sanitizeHtml(bodyInput.innerHTML);p.updatedAt=Date.now();
    await dbPut(p);
    showSaveState('保存しました ✓');
    updateTreeTitle(id,p);
  },600);
}
function showSaveState(msg,keep){
  saveState.textContent=msg;saveState.style.opacity='1';
  clearTimeout(saveStateTimer);
  if(!keep)saveStateTimer=setTimeout(()=>{saveState.style.opacity='0';},1400);
}

/* ===== 検索 ===== */
const searchInput=document.getElementById('search-input');
const searchClear=document.getElementById('search-clear');
const searchResults=document.getElementById('search-results');
let searchTimer=null;

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim();
  searchClear.classList.toggle('show',q.length>0);
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>doSearch(q),200);
});
searchClear.onclick=()=>{
  searchInput.value='';searchClear.classList.remove('show');
  hideSearch();
};

function doSearch(q){
  if(!q){hideSearch();return;}
  const kw=q.toLowerCase();
  const hits=pages.filter(p=>!p.deletedAt).filter(p=>{
    const t=(p.title||'').toLowerCase();
    const b=htmlToText(p.body||'').toLowerCase();
    return t.includes(kw)||b.includes(kw);
  });
  searchResults.style.display='';
  document.getElementById('tree-wrap').style.display='none';
  if(hits.length===0){
    searchResults.innerHTML=`<div class="sr-empty">「${escapeHtml(q)}」に一致するページはありません</div>`;
    return;
  }
  searchResults.innerHTML='';
  hits.forEach(p=>{
    const div=document.createElement('div');div.className='sr-item';
    const titleRaw=displayTitle(p)||'無題';
    const bodyRaw=htmlToText(p.body||'');
    // スニペット：キーワード周辺30文字
    const bLower=bodyRaw.toLowerCase();
    const idx=bLower.indexOf(q.toLowerCase());
    let snippet='';
    if(idx>=0){
      const start=Math.max(0,idx-15);
      const end=Math.min(bodyRaw.length,idx+q.length+15);
      snippet=(start>0?'…':'')+bodyRaw.slice(start,end)+(end<bodyRaw.length?'…':'');
    } else {
      snippet=bodyRaw.slice(0,50)+(bodyRaw.length>50?'…':'');
    }
    div.innerHTML=`<div class="sr-title">${highlight(escapeHtml(titleRaw),escapeHtml(q))}</div>`
      +(snippet?`<div class="sr-snippet">${highlight(escapeHtml(snippet),escapeHtml(q))}</div>`:'');
    div.onclick=()=>{
      openEditor(p.id);
      // 検索をクリア
      searchInput.value='';searchClear.classList.remove('show');hideSearch();
      document.body.classList.remove('nav-open');
    };
    searchResults.appendChild(div);
  });
}
function highlight(html,kw){
  if(!kw)return html;
  const re=new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return html.replace(re,m=>`<span class="sr-hit">${m}</span>`);
}
function hideSearch(){
  searchResults.style.display='none';
  document.getElementById('tree-wrap').style.display='';
}

/* ===== ツリー描画 ===== */
const treeWrap=document.getElementById('tree-wrap');
function displayTitle(p){
  const t=(p.title||'').trim();if(t)return t;
  const firstLine=htmlToText(p.body||'').split('\n').find(l=>l.trim());
  if(firstLine)return firstLine.trim();
  return null;
}
function renderTree(){
  const roots=liveChildren(null);
  if(roots.length===0){treeWrap.innerHTML='<div class="empty-hint">まだページがありません。<br>下の「新規ページ」から<br>始めてください。</div>';return;}
  treeWrap.innerHTML='';roots.forEach(r=>treeWrap.appendChild(buildNode(r,0)));
}
function buildNode(p,depth){
  const frag=document.createDocumentFragment();
  const kids=liveChildren(p.id),hasKids=kids.length>0,isCol=collapsed.has(p.id);
  const row=document.createElement('div');
  row.className='node-row'+(p.id===currentId?' active':'')+(isCol?' collapsed':'');
  row.dataset.id=p.id;row.style.paddingLeft=(depth*15)+'px';row.draggable=true;
  const tw=document.createElement('div');
  tw.className='twist'+(hasKids?'':' empty');
  tw.innerHTML='<svg width="9" height="9" viewBox="0 0 12 12" fill="currentColor"><path d="M3 2l5 4-5 4z"/></svg>';
  tw.onclick=(e)=>{e.stopPropagation();if(!hasKids)return;if(isCol)collapsed.delete(p.id);else collapsed.add(p.id);renderTree();};
  row.appendChild(tw);
  const dt=displayTitle(p);
  const tt=document.createElement('div');
  tt.className='node-title'+(dt?'':' untitled');tt.textContent=dt||'無題';
  tt.onclick=()=>openEditor(p.id);
  row.appendChild(tt);
  const mini=document.createElement('div');mini.className='node-mini';
  const bAdd=document.createElement('button');bAdd.title='子ページを追加';
  bAdd.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
  bAdd.onclick=(e)=>{e.stopPropagation();createPage(p.id);};
  const bRen=document.createElement('button');bRen.title='名前を変える';
  bRen.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
  bRen.onclick=(e)=>{e.stopPropagation();inlineRename(row,p);};
  mini.appendChild(bAdd);mini.appendChild(bRen);row.appendChild(mini);
  row.addEventListener('dragstart',(e)=>{e.dataTransfer.setData('text/plain',p.id);e.dataTransfer.effectAllowed='move';});
  row.addEventListener('dragover',(e)=>{e.preventDefault();row.classList.add('drop-target');});
  row.addEventListener('dragleave',()=>row.classList.remove('drop-target'));
  row.addEventListener('drop',(e)=>{e.preventDefault();row.classList.remove('drop-target');const d=e.dataTransfer.getData('text/plain');if(d&&d!==p.id)movePage(d,p.id);});
  frag.appendChild(row);
  if(hasKids&&!isCol)kids.forEach(k=>frag.appendChild(buildNode(k,depth+1)));
  return frag;
}
function updateTreeTitle(id,p){
  const el=treeWrap.querySelector(`.node-row[data-id="${id}"] .node-title`);
  if(!el){renderTree();return;}
  const dt=displayTitle(p);el.textContent=dt||'無題';
  el.className='node-title'+(dt?'':' untitled');
}
function inlineRename(row,p){
  const titleEl=row.querySelector('.node-title');
  const input=document.createElement('input');
  input.className='rename-input';input.value=p.title||'';input.placeholder='無題';
  titleEl.replaceWith(input);input.focus();input.select();
  const commit=async()=>{p.title=input.value.trim();p.updatedAt=Date.now();await dbPut(p);if(p.id===currentId)titleInput.value=p.title;renderTree();};
  input.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();input.blur();}if(e.key==='Escape')renderTree();});
  input.addEventListener('blur',commit);
}

/* ===== エディタ ===== */
const editorArea=document.getElementById('editor-area');
const emptyState=document.getElementById('empty-state');
const titleInput=document.getElementById('title-input');
const bodyInput=document.getElementById('body-input');
const crumb=document.getElementById('crumb');
const saveState=document.getElementById('save-state');
const charCount=document.getElementById('char-count');
function updateCharCount(){
  if(!charCount)return;
  const n=htmlToText(bodyInput.innerHTML).replace(/\n/g,'').length;
  charCount.textContent=n;
}

function openEditor(id,focusTitle){
  const p=byId(id);if(!p||p.deletedAt){showEmpty();return;}
  currentId=id;
  editorArea.style.display='block';emptyState.style.display='none';
  titleInput.value=p.title||'';
  bodyInput.innerHTML=sanitizeHtml(p.body||'');
  updateCharCount();
  renderCrumb(p);renderTree();
  document.body.classList.remove('nav-open');
  editorArea.scrollTop=0;
  if(focusTitle){setTimeout(()=>titleInput.focus(),50);}
}
function showEmpty(){currentId=null;editorArea.style.display='none';emptyState.style.display='flex';crumb.textContent='';document.body.classList.remove('rt-active');hidePalette();}
function renderCrumb(p){
  const chain=[];let cur=p,guard=0;
  while(cur&&guard<10000){chain.unshift(cur);cur=cur.parentId?byId(cur.parentId):null;guard++;}
  crumb.innerHTML=chain.map((n,i)=>{
    const safe=escapeHtml(displayTitle(n)||'無題');
    if(i===chain.length-1)return `<span class="cur">${safe}</span>`;
    return `<span class="cr" data-id="${n.id}" style="cursor:pointer">${safe}</span><span class="sep">›</span>`;
  }).join('');
  crumb.querySelectorAll('.cr').forEach(el=>el.onclick=()=>openEditor(el.dataset.id));
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

titleInput.addEventListener('input',scheduleSave);
bodyInput.addEventListener('input',()=>{updateCharCount();scheduleSave();});
bodyInput.addEventListener('focus',()=>{document.body.classList.add('rt-active');});
bodyInput.addEventListener('blur',()=>{

let rtInteracting=false;
function markInteracting(){
  rtInteracting=true;

const moveList=document.getElementById('move-list');
function openMove(){
  if(!currentId){toast('先にページを開いてください');return;}
  const p=byId(currentId);moveList.innerHTML='';
  const rootBtn=document.createElement('button');
  rootBtn.className='move-item'+(p.parentId===null?' is-current disabled':'');
  rootBtn.innerHTML='<span>▸ 最上位（ルート）へ</span>';
  rootBtn.onclick=()=>{if(p.parentId!==null){movePage(currentId,null);closeOv('ov-move');}};
  moveList.appendChild(rootBtn);
  const ordered=[];
  (function walk(pid,depth){liveChildren(pid).forEach(c=>{ordered.push({node:c,depth});walk(c.id,depth+1);});})(null,0);
  ordered.forEach(({node,depth})=>{
    const forbidden=isSelfOrDescendant(node.id,currentId);
    const isParentNow=node.id===p.parentId;
    const item=document.createElement('button');
    item.className='move-item'+(forbidden?' disabled':'')+(isParentNow?' is-current':'');
    const indent='　'.repeat(depth);
    const dt=escapeHtml(displayTitle(node)||'無題');
    item.innerHTML=`<span class="mv-depth">${indent}└</span><span>${dt}${isParentNow?'（現在の親）':''}</span>`;
    if(!forbidden)item.onclick=()=>{movePage(currentId,node.id);closeOv('ov-move');};
    moveList.appendChild(item);
  });
  openOv('ov-move');
}

const trashBody=document.getElementById('trash-body');
function renderTrash(){
  const items=pages.filter(p=>p.deletedAt).sort((a,b)=>b.deletedAt-a.deletedAt);
  if(items.length===0){trashBody.innerHTML='<div style="padding:20px;text-align:center;color:var(--ink-faint);font-size:13px;">ゴミ箱は空です</div>';return;}
  trashBody.innerHTML='';
  items.forEach(p=>{
    const div=document.createElement('div');div.className='trash-item';
    const dt=escapeHtml(displayTitle(p)||'無題');
    const when=new Date(p.deletedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    div.innerHTML=`<div class="trash-meta"><div class="tt">${dt}</div><div class="ti">${when} に削除</div></div><div class="trash-acts"><button class="restore">復元</button><button class="purge">完全削除</button></div>`;
    div.querySelector('.restore').onclick=()=>restorePage(p.id);
    div.querySelector('.purge').onclick=()=>askConfirm('完全に削除しますか',`「${dt}」を完全に削除します。<br><b style="color:var(--danger)">この操作は取り消せません。</b>`,()=>purgePage(p.id));
    trashBody.appendChild(div);
  });
}

const storageBody=document.getElementById('storage-body');
async function renderStorage(){
  const live=pages.filter(p=>!p.deletedAt).length;
  const trash=pages.filter(p=>p.deletedAt).length;
  let persisted=false,quota='—',usage='—';
  try{
    if(navigator.storage&&navigator.storage.persisted)persisted=await navigator.storage.persisted();
    if(navigator.storage&&navigator.storage.estimate){const est=await navigator.storage.estimate();if(est.usage!=null)usage=fmtBytes(est.usage);if(est.quota!=null)quota=fmtBytes(est.quota);}
  }catch(e){}
  const last=localStorage.getItem('kaiso_last_backup');
  const lastTxt=last?daysAgo(parseInt(last,10)):'<span style="color:var(--ink-faint)">まだありません（自動保存は有効です）</span>';
  storageBody.innerHTML=`
    <div class="stor-line"><span class="k">ページ数</span><span class="v">${live} 件</span></div>
    <div class="stor-line"><span class="k">ゴミ箱</span><span class="v">${trash} 件</span></div>
    <div class="stor-line"><span class="k">データ保護</span><span class="v">${persisted?'<span class="badge ok">有効</span>':'<span class="badge warn">未確定</span>'}</span></div>
    <div class="stor-line"><span class="k">使用量 / 上限</span><span class="v">${usage} / ${quota}</span></div>
    <div class="stor-line"><span class="k">前回のJSON控え</span><span class="v">${lastTxt}</span></div>
    <div class="hint-box">通常は<b>自動保存</b>されるので操作は不要です。<br>機種変更などに備えて、ときどき「JSON書き出し」で控えを取っておくとより安心です。</div>`;
}
function fmtBytes(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(2)+' GB';}
function daysAgo(ts){const d=Math.floor((Date.now()-ts)/86400000);if(d<=0)return '今日';if(d===1)return '1日前';if(d<=7)return d+'日前';return `<span style="color:var(--danger)">${d}日前</span>`;}

function exportJSON(){
  const payload={app:APP_TAG,version:4,exportedAt:Date.now(),pages};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`知の階層メモ_backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  localStorage.setItem('kaiso_last_backup',String(Date.now()));
  renderStorage();toast('バックアップを書き出しました');
}

/* ===== Android キーボード対策：高さをCSS変数で固定 ===== */
function fixAppHeight(){
  // キーボードが出ても画面が押し上げられないよう、
  // 起動時の実高さを --app-h に固定してCSSで使う
  const h = window.innerHeight;
  document.documentElement.style.setProperty('--app-h', h + 'px');
}
// 起動時に1回だけ固定（リサイズは無視 = キーボード出ても動かない）

// PC用：ウィンドウリサイズ時だけ更新（スマホのキーボードによるリサイズは無視）
let lastW = window.innerWidth;
window.addEventListener('resize', () => {
  if(window.innerWidth !== lastW){ // 幅が変わったときだけ（= PCのウィンドウリサイズ）
    lastW = window.innerWidth;
    fixAppHeight();
  }
});

/* ===== ツールバーをキーボードの真上に追従させる =====
   visualViewport（枯れていて安定した仕組み）で「いま見えている画面の下端」を測り、
   キーボードに隠れる高さぶんだけツールバーを押し上げる。
   仕組み：画面全体の高さ − (見えている高さ + 上オフセット) = キーボードの高さ */
function updateKeyboardInset(){
  const vv = window.visualViewport;
  let inset = 0;
  if(vv){
    // レイアウト全体の高さ（キーボードを含む）
    const layoutH = document.documentElement.clientHeight || window.innerHeight;
    // 見えている領域の下端より下に隠れている高さ
    inset = Math.max(0, layoutH - (vv.height + vv.offsetTop));
  }
  // 1px未満の誤差は0扱い（カクつき防止）
  if(inset < 1) inset = 0;
  document.documentElement.style.setProperty('--kb-inset', inset + 'px');
}
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', updateKeyboardInset);
  window.visualViewport.addEventListener('scroll', updateKeyboardInset);
}
updateKeyboardInset();

/* ===== 選択範囲の保持 =====
   スマホでは、ツールバーのボタンに触れた瞬間に本文の選択が外れることがある。
   そこで「本文内で選択が起きるたびに範囲を覚えておき」、ボタン操作時に復元する。
   重要: ボタンには preventDefault を一切付けない（タップ自体が潰れる不具合の元のため）。
   代わりに pointerdown のタイミングで「いま覚えている選択」を使う。 */
let savedRange=null;
function saveSelection(){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount>0){
    const r=sel.getRangeAt(0);
    if(bodyInput.contains(r.commonAncestorContainer)){savedRange=r.cloneRange();}
  }
}
function getWorkingRange(){
  // いま本文内に「範囲のある」選択があればそれを優先。
  // カーソルだけ(collapsed)や本文外の場合は、保存済みの範囲を使う。
  const sel=window.getSelection();
  if(sel&&sel.rangeCount>0){
    const r=sel.getRangeAt(0);
    if(!r.collapsed&&bodyInput.contains(r.commonAncestorContainer))return r;
  }
  if(savedRange&&!savedRange.collapsed)return savedRange;
  return null;
}
/* 選択が変わるたびに保存（本文にフォーカスがある時だけ） */
document.addEventListener('selectionchange',()=>{
  if(document.activeElement===bodyInput)saveSelection();
});
bodyInput.addEventListener('keyup',()=>{saveSelection();updateToolbarState();});
bodyInput.addEventListener('mouseup',()=>{saveSelection();updateToolbarState();});

/* ===== 自前の装飾エンジン（execCommandに依存しない） =====
   選択範囲を指定タグ/スタイルで包む。既にかかっていれば解除する（トグル）。
   これにより、スマホChromeでのexecCommand空振り問題を根本回避する。 */

/* 指定要素が、本文内で「装飾A」に該当するか判定する関数群 */
function isBold(el){return el.nodeName==='B'||el.nodeName==='STRONG'||(el.style&&(el.style.fontWeight==='bold'||el.style.fontWeight==='700'));}
function isUnderline(el){return el.nodeName==='U'||(el.style&&el.style.textDecorationLine&&el.style.textDecorationLine.indexOf('underline')>=0)||(el.style&&el.style.textDecoration&&el.style.textDecoration.indexOf('underline')>=0);}
function isStrike(el){return el.nodeName==='S'||el.nodeName==='STRIKE'||(el.style&&el.style.textDecorationLine&&el.style.textDecorationLine.indexOf('line-through')>=0)||(el.style&&el.style.textDecoration&&el.style.textDecoration.indexOf('line-through')>=0);}

/* 選択範囲に該当装飾がかかっているか調べ、該当要素を返す（解除用）。
   1) 祖先方向（範囲が装飾の内側にある場合）
   2) 子孫方向（範囲が装飾を丸ごと含む場合）の両方を見る。 */
function findAncestor(range,testFn){
  // 1) 祖先方向
  let node=range.commonAncestorContainer;
  if(node.nodeType===3)node=node.parentNode;
  while(node&&node!==bodyInput){
    if(node.nodeType===1&&testFn(node))return node;
    node=node.parentNode;
  }
  // 2) commonAncestor が本文や中間要素の場合、範囲が内包する該当要素を探す
  let container=range.commonAncestorContainer;
  if(container.nodeType===3)container=container.parentNode;
  if(container){
    // 範囲に完全に含まれ、かつ testFn を満たす要素を返す
    const candidates=container.querySelectorAll?container.querySelectorAll('*'):[];
    for(const el of candidates){
      if(testFn(el)&&range.intersectsNode&&range.intersectsNode(el)){
        // 要素全体が選択範囲に含まれているか（おおむね）を確認
        return el;
      }
    }
  }
  return null;
}

/* 要素の殻を外して中身を残す（装飾解除） */
function unwrap(el){
  const parent=el.parentNode;
  while(el.firstChild)parent.insertBefore(el.firstChild,el);
  parent.removeChild(el);
}

/* 範囲を指定タグで包む */
function wrapRange(range,tagName){
  const wrapper=document.createElement(tagName);
  try{
    wrapper.appendChild(range.extractContents());
    range.insertNode(wrapper);
    // 包んだ中身を選択し直す
    const sel=window.getSelection();
    const nr=document.createRange();
    nr.selectNodeContents(wrapper);
    sel.removeAllRanges();sel.addRange(nr);
    savedRange=nr.cloneRange();
  }catch(e){}
}

/* トグル装飾の本体（B/U/S） */
function toggleStyle(kind){
  const range=getWorkingRange();
  if(!range||range.collapsed){ // 選択が無い/カーソルだけ → 何もしない
    flashHint('文字を選んでから押してください');
    return;
  }
  // 作業対象の範囲を選択状態に復元（focusは呼ばない＝選択が潰れるのを防ぐ）
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  const testFn=kind==='bold'?isBold:(kind==='underline'?isUnderline:isStrike);
  const tag=kind==='bold'?'b':(kind==='underline'?'u':'s');
  const existing=findAncestor(range,testFn);
  if(existing){
    // すでに装飾あり → 解除（殻を外す）
    unwrap(existing);
  }else{
    wrapRange(range,tag);
  }
  afterEdit();
}

/* 文字色 / マーカーの適用（span で包む） */
function applyColor(mode,color){
  const range=getWorkingRange();
  if(!range||range.collapsed){flashHint('文字を選んでから押してください');return;}
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);

  if(mode==='color'){
    // 既存のcolor指定spanがあれば色を差し替え、無ければ新規span
    const span=document.createElement('span');
    span.style.color=color;
    try{
      span.appendChild(range.extractContents());
      // 中の入れ子colorspanを掃除（最外殻の色を優先）
      span.querySelectorAll('span').forEach(s=>{if(s.style&&s.style.color)s.style.color='';});
      range.insertNode(span);
      reselect(span);
    }catch(e){}
  }else{
    if(color==='transparent'){
      // マーカー解除: 選択範囲にかかる背景色spanの背景を消す
      const mk=findAncestor(range,el=>el.style&&el.style.backgroundColor&&el.style.backgroundColor!=='transparent');
      if(mk){mk.style.backgroundColor='';if(!mk.getAttribute('style'))unwrap(mk);else if(mk.style.length===0)unwrap(mk);}
      else{
        // 選択内の背景色spanを掃除
        const frag=range.cloneContents();
        const tmp=document.createElement('span');tmp.appendChild(range.extractContents());
        tmp.querySelectorAll('span').forEach(s=>{if(s.style)s.style.backgroundColor='';});
        // tmp自体は背景なしの素のspan → 殻を外して中身だけ戻す
        range.insertNode(tmp);reselect(tmp);
        const parent=tmp.parentNode;while(tmp.firstChild)parent.insertBefore(tmp.firstChild,tmp);parent.removeChild(tmp);
      }
    }else{
      const span=document.createElement('span');
      span.style.backgroundColor=color;
      try{
        span.appendChild(range.extractContents());
        span.querySelectorAll('span').forEach(s=>{if(s.style&&s.style.backgroundColor)s.style.backgroundColor='';});
        range.insertNode(span);
        reselect(span);
      }catch(e){}
    }
  }
  afterEdit();
}

/* 要素の中身を選択し直す */
function reselect(el){
  const sel=window.getSelection();
  const nr=document.createRange();
  nr.selectNodeContents(el);
  sel.removeAllRanges();sel.addRange(nr);
  savedRange=nr.cloneRange();
}

/* ツールバーのオン/オフ状態を反映（自前判定） */
function updateToolbarState(){
  const range=getWorkingRange();
  const set=(id,on)=>{const b=document.getElementById(id);if(b)b.classList.toggle('on',!!on);};
  if(!range){set('rt-bold',false);set('rt-underline',false);set('rt-strike',false);return;}
  set('rt-bold',!!findAncestor(range,isBold));
  set('rt-underline',!!findAncestor(range,isUnderline));
  set('rt-strike',!!findAncestor(range,isStrike));
}

/* ===== ボタン結線（preventDefaultなし・clickで発火） =====
   pointerdownで「直前の選択」を確実に保存してからclickを受ける。 */
function bindToolBtn(btn,handler){
  if(!btn)return;
  // 触れた瞬間に選択を保存（本文の選択が外れる前に掴む）
  btn.addEventListener('pointerdown',()=>{saveSelection();});
  btn.addEventListener('click',(e)=>{e.preventDefault();handler();});
}
bindToolBtn(document.getElementById('rt-bold'),()=>toggleStyle('bold'));
bindToolBtn(document.getElementById('rt-underline'),()=>toggleStyle('underline'));
bindToolBtn(document.getElementById('rt-strike'),()=>toggleStyle('strike'));

/* ===== 色パレット ===== */
let paletteMode=null; // 'color' | 'marker'
function buildPalette(mode){
  rtPalette.innerHTML='';
  const list=mode==='color'?TEXT_COLORS:MARKER_COLORS;
  list.forEach(c=>{
    const chip=document.createElement('div');
    chip.className='pal-chip';chip.style.background=c.color;chip.title=c.name;
    chip.addEventListener('pointerdown',()=>{/* 選択は既に保存済み */});
    chip.addEventListener('click',(e)=>{e.preventDefault();pickColor(mode,c.color);});
    rtPalette.appendChild(chip);
  });
  if(mode==='marker'){
    const none=document.createElement('div');
    none.className='pal-chip none';none.title='マーカーを消す';
    none.addEventListener('click',(e)=>{e.preventDefault();pickColor('marker','transparent');});
    rtPalette.appendChild(none);
  }
  const picker=document.createElement('div');
  picker.className='pal-chip picker';picker.title='自由に選ぶ';
  const inp=document.createElement('input');inp.type='color';
  inp.value=mode==='color'?rgbToHex(lastTextColor,'#d92020'):rgbToHex(lastMarkerColor,'#fff3a0');
  inp.addEventListener('input',(e)=>{pickColor(mode,e.target.value);});
  picker.appendChild(inp);
  rtPalette.appendChild(picker);
}
function rgbToHex(v,fallback){ if(typeof v==='string'&&/^#[0-9a-f]{6}$/i.test(v))return v; return fallback||'#000000'; }
function pickColor(mode,color){
  if(mode==='color'){
    if(color!=='transparent')lastTextColor=color;
    applyColor('color',color);
    updateColorDot();
  }else{
    if(color!=='transparent')lastMarkerColor=color;
    applyColor('marker',color);
    updateMarkerDot();
  }
  hidePalette();
}
function updateColorDot(){const d=document.getElementById('rt-color-dot');if(d)d.style.background=lastTextColor;}
function updateMarkerDot(){const d=document.getElementById('rt-marker-dot');if(d)d.style.background=lastMarkerColor;}

function showPalette(mode,anchorBtn){
  if(rtPalette.classList.contains('show')&&paletteMode===mode){hidePalette();return;}
  paletteMode=mode;
  buildPalette(mode);
  rtPalette.classList.add('show');
  const r=anchorBtn.getBoundingClientRect();
  const pr=rtPalette.getBoundingClientRect();
  let left=r.left+r.width/2-pr.width/2;
  left=Math.max(8,Math.min(left,window.innerWidth-pr.width-8));
  // ツールバーは画面下部にあるので、パレットはボタンの上に出す
  let top=r.top-pr.height-8;
  // 上にはみ出す場合はボタンの下に
  if(top<8)top=r.bottom+8;
  rtPalette.style.left=left+'px';
  rtPalette.style.top=top+'px';
}
function hidePalette(){rtPalette.classList.remove('show');paletteMode=null;}

const rtColorBtn=document.getElementById('rt-color');
const rtMarkerBtn=document.getElementById('rt-marker');
rtColorBtn.addEventListener('pointerdown',()=>{saveSelection();});
rtMarkerBtn.addEventListener('pointerdown',()=>{saveSelection();});
rtColorBtn.addEventListener('click',(e)=>{e.preventDefault();showPalette('color',rtColorBtn);});
rtMarkerBtn.addEventListener('click',(e)=>{e.preventDefault();showPalette('marker',rtMarkerBtn);});

/* 完了ボタン：編集を確定し、ツールバーとキーボードを閉じる */
const rtDoneBtn=document.getElementById('rt-done');
rtDoneBtn.addEventListener('click',(e)=>{
  e.preventDefault();
  hidePalette();
  bodyInput.blur();
  document.body.classList.remove('rt-active');
  if(currentId){
    const p=byId(currentId);
    if(p){p.title=titleInput.value;p.body=sanitizeHtml(bodyInput.innerHTML);p.updatedAt=Date.now();dbPut(p);updateTreeTitle(currentId,p);}
  }
});

/* ===== 画像の挿入（自動圧縮で約80KBに収める） ===== */
const IMG_TARGET_BYTES=80*1024;   // 目標サイズ 80KB
const IMG_MAX_EDGE=1000;          // 長辺の上限 1000px
const rtImageBtn=document.getElementById('rt-image');
const rtImageInput=document.getElementById('rt-image-input');

rtImageBtn.addEventListener('pointerdown',()=>{saveSelection();});
rtImageBtn.addEventListener('click',(e)=>{e.preventDefault();rtImageInput.value='';rtImageInput.click();});

rtImageInput.addEventListener('change',async(e)=>{
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  if(!/^image\//.test(file.type)){toast('画像ファイルを選んでください');return;}
  try{
    toast('画像を処理中…');
    const dataUrl=await compressImage(file,IMG_MAX_EDGE,IMG_TARGET_BYTES);
    insertImageAtSelection(dataUrl);
    afterEdit();
    const kb=Math.round(dataUrl.length*0.75/1024); // base64の実バイト概算
    toast('画像を挿入しました（約'+kb+'KB）');
  }catch(err){
    toast('画像の処理に失敗しました');
  }
  rtImageInput.value='';
});

/* 画像をcanvasで縮小→JPEG圧縮し、目標バイト以下のdataURLを返す */
function compressImage(file,maxEdge,targetBytes){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('read'));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('decode'));
      img.onload=()=>{
        let width=img.width,height=img.height;
        // 長辺をmaxEdgeに収まるよう縮小
        if(width>height){ if(width>maxEdge){height=Math.round(height*maxEdge/width);width=maxEdge;} }
        else{ if(height>maxEdge){width=Math.round(width*maxEdge/height);height=maxEdge;} }
        const canvas=document.createElement('canvas');
        canvas.width=width;canvas.height=height;
        const ctx=canvas.getContext('2d');
        // 透過画像対策：白背景を敷いてからJPEG化
        ctx.fillStyle='#ffffff';ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        // 品質を段階的に下げて目標サイズ以下を狙う
        let quality=0.85;
        let out=canvas.toDataURL('image/jpeg',quality);
        let guard=0;
        while(out.length*0.75>targetBytes && quality>0.35 && guard<8){
          quality-=0.1;
          out=canvas.toDataURL('image/jpeg',quality);
          guard++;
        }
        // それでも大きければ、さらに寸法を縮めて再試行（1回だけ）
        if(out.length*0.75>targetBytes && Math.max(width,height)>700){
          const c2=document.createElement('canvas');
          const s=700/Math.max(width,height);
          c2.width=Math.round(width*s);c2.height=Math.round(height*s);
          const x2=c2.getContext('2d');
          x2.fillStyle='#ffffff';x2.fillRect(0,0,c2.width,c2.height);
          x2.drawImage(img,0,0,c2.width,c2.height);
          out=c2.toDataURL('image/jpeg',0.7);
        }
        resolve(out);
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* 選択位置（保存済みの範囲）に画像を挿入 */
function insertImageAtSelection(dataUrl){
  const img=document.createElement('img');
  img.src=dataUrl;img.className='rt-img';
  const range=getWorkingRange()||savedRange;
  if(range&&bodyInput.contains(range.commonAncestorContainer)){
    const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
    range.deleteContents();
    range.insertNode(img);
    // 画像の後ろに改行を入れて続きを書きやすく、カーソルもそこへ
    const br=document.createElement('br');
    if(img.nextSibling)img.parentNode.insertBefore(br,img.nextSibling);
    else img.parentNode.appendChild(br);
    const nr=document.createRange();nr.setStartAfter(br);nr.collapse(true);
    sel.removeAllRanges();sel.addRange(nr);savedRange=nr.cloneRange();
  }else{
    // 選択が無ければ本文末尾に追加
    bodyInput.appendChild(img);
    bodyInput.appendChild(document.createElement('br'));
  }
}

/* ===== 画像の拡大ビュー ===== */
const imgViewer=document.getElementById('img-viewer');
const ivImg=document.getElementById('iv-img');
const ivClose=document.getElementById('iv-close');
/* 本文内の画像タップで拡大表示 */
bodyInput.addEventListener('click',(e)=>{
  const t=e.target;
  if(t&&t.tagName==='IMG'&&t.classList.contains('rt-img')){
    ivImg.src=t.src;
    imgViewer.classList.add('show');
  }
});
function closeViewer(){imgViewer.classList.remove('show');ivImg.src='';}
ivClose.addEventListener('click',closeViewer);
imgViewer.addEventListener('click',(e)=>{if(e.target===imgViewer)closeViewer();});

/* 本文・ツールバー以外をタップしたらパレットを閉じる */
document.addEventListener('mousedown',e=>{
  if(rtPalette.contains(e.target))return;
  if(rtToolbar.contains(e.target))return;
  hidePalette();
});
updateColorDot();updateMarkerDot();

/* ===== 起動 ===== */
async function boot(){
  try{await openDB();}
  catch(e){document.body.innerHTML='<div style="padding:40px;font-family:sans-serif;color:#9a3b2e;">この端末ではデータベースを開けませんでした。プライベートブラウズを解除するか、別のブラウザでお試しください。</div>';return;}
  try{if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist();}catch(e){}
  pages=await dbGetAll();
  if(pages.length===0){
    const now=Date.now();
    const welcome={id:uid(),parentId:null,title:'ようこそ',
      body:'このメモは<b>自動で保存</b>されます。<br><br>本文を書くときは、文字を選んでから下の<b>ツールバー</b>で装飾できます。<br><br>使えるのは <b>太字</b>・<u>下線</u>・<s>取り消し線</s>・<span style="background-color:#fff3a0">マーカー</span>・<span style="color:#d92020">文字色</span> です。<br><br>文字色とマーカーはボタンを押すと色パレットが出ます。5色＋自由に選べる色、マーカーには「消す」もあります。<br><br>このページは消してもらってかまいません。',
      order:1,createdAt:now,updatedAt:now,deletedAt:null};
    pages.push(welcome);await dbPut(welcome);
  }
  renderTree();showEmpty();
}
boot();
</script>
