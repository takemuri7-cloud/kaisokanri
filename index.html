<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f1e8">
<title>知の階層メモ</title>
<style>
  :root{
    --paper:#f4f1e8;--paper-card:#faf8f1;--side:#ebe6d8;--side-hover:#e2dccb;
    --line:#d8d0bd;--line-soft:#e4ddcc;--ink:#2c2a24;--ink-soft:#6b665a;--ink-faint:#9b9484;
    --accent:#8a5a2b;--accent-soft:#b88a52;--accent-bg:#ece2cf;
    --danger:#9a3b2e;--danger-bg:#f2dcd6;--ok:#4a6b3f;
    --link:#2a5a8a;--link-bg:#e8f0f8;
    --shadow:0 1px 2px rgba(44,42,36,.06),0 4px 14px rgba(44,42,36,.05);
    --radius:7px;--side-w:286px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(0deg,rgba(140,120,80,.012) 0 1px,transparent 1px 3px);opacity:.6;}
  button,input,textarea{font-family:inherit;color:inherit;}
  button{cursor:pointer;border:none;background:none;}

  #app{display:flex;height:var(--app-h,100vh);position:relative;z-index:1;}

  /* ===== サイドバー ===== */
  #sidebar{width:var(--side-w);flex:0 0 var(--side-w);background:var(--side);
    border-right:1px solid var(--line);display:flex;flex-direction:column;height:var(--app-h,100vh);}
  #side-head{padding:14px 16px 10px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:8px;}
  #side-head .logo{font-size:17px;font-weight:600;letter-spacing:.14em;color:var(--ink);}
  #side-head .ver{font-size:10px;color:var(--ink-faint);letter-spacing:.1em;}

  /* 検索窓 */
  #search-wrap{padding:8px 10px;border-bottom:1px solid var(--line-soft);position:relative;}
  #search-input{width:100%;height:32px;border:1px solid var(--line);border-radius:6px;
    background:var(--paper-card);padding:0 30px 0 10px;font-size:13px;color:var(--ink);outline:none;}
  #search-input:focus{border-color:var(--accent-soft);}
  #search-input::placeholder{color:var(--ink-faint);}
  #search-clear{position:absolute;right:16px;top:50%;transform:translateY(-50%);
    display:none;width:22px;height:22px;border-radius:50%;background:var(--ink-faint);
    color:#fff;font-size:13px;align-items:center;justify-content:center;}
  #search-clear.show{display:flex;}

  /* 検索結果 */
  #search-results{flex:1 1 auto;overflow-y:auto;padding:4px 6px 90px;}
  #search-results::-webkit-scrollbar{width:8px;}
  #search-results::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .sr-item{padding:9px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--ink);margin:1px 0;}
  .sr-item:hover{background:var(--side-hover);}
  .sr-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-snippet{font-size:11.5px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-hit{background:rgba(138,90,43,.18);border-radius:2px;padding:0 1px;}
  .sr-empty{padding:20px 14px;text-align:center;color:var(--ink-faint);font-size:12.5px;}

  #tree-wrap{flex:1 1 auto;overflow-y:auto;padding:6px 6px 90px;}
  #tree-wrap::-webkit-scrollbar{width:8px;}
  #tree-wrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .node-row{display:flex;align-items:center;gap:2px;border-radius:5px;margin:1px 0;
    font-size:13.5px;line-height:1.3;color:var(--ink);transition:background .12s;position:relative;}
  .node-row:hover{background:var(--side-hover);}
  .node-row.active{background:var(--accent-bg);}
  .node-row.active::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:3px;border-radius:2px;background:var(--accent);}
  .node-row.drop-target{box-shadow:inset 0 0 0 1.5px var(--accent-soft);border-radius:5px;}
  .twist{flex:0 0 18px;width:18px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:10px;user-select:none;}
  .twist.empty{visibility:hidden;}
  .twist svg{transition:transform .15s;}
  .node-row.collapsed .twist svg{transform:rotate(-90deg);}
  .node-title{flex:1 1 auto;padding:6px 4px 6px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .node-title.untitled{color:var(--ink-faint);font-style:italic;}
  .node-mini{flex:0 0 auto;display:flex;gap:1px;opacity:0;transition:opacity .12s;padding-right:4px;}
  .node-row:hover .node-mini,.node-row.active .node-mini{opacity:1;}
  .node-mini button{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
  .node-mini button:hover{background:rgba(0,0,0,.07);color:var(--ink);}
  .node-mini button:active{transform:scale(.92);}
  .empty-hint{padding:24px 16px;color:var(--ink-faint);font-size:12.5px;line-height:1.8;text-align:center;}

  #side-foot{position:absolute;left:0;bottom:0;width:var(--side-w);
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--side) 70%,transparent);display:flex;gap:8px;}
  .btn-new{flex:1 1 auto;height:42px;border-radius:var(--radius);background:var(--accent);color:#f7f0e2;
    font-size:14px;letter-spacing:.08em;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;
    box-shadow:var(--shadow);transition:transform .1s,filter .1s;}
  .btn-new:hover{filter:brightness(1.06);}
  .btn-new:active{transform:translateY(1px);}
  .btn-icon-sq{flex:0 0 42px;width:42px;height:42px;border-radius:var(--radius);background:var(--paper-card);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);box-shadow:var(--shadow);}
  .btn-icon-sq:hover{background:#fff;color:var(--ink);}
  .btn-icon-sq:active{transform:translateY(1px);}

  /* ===== 本文 ===== */
  #main{flex:1 1 auto;display:flex;flex-direction:column;height:var(--app-h,100vh);background:var(--paper-card);min-width:0;}
  #topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--line-soft);background:var(--paper-card);}
  #btn-menu{display:none;}
  #crumb{flex:1 1 auto;min-width:0;font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;}
  #crumb .sep{color:var(--ink-faint);margin:0 5px;}
  #crumb .cur{color:var(--ink);}
  #topbar .tb-btn{flex:0 0 auto;height:32px;padding:0 11px;border-radius:6px;font-size:12.5px;color:var(--ink-soft);border:1px solid transparent;display:flex;align-items:center;gap:5px;}
  #topbar .tb-btn:hover{background:var(--side-hover);color:var(--ink);}
  #topbar .tb-btn.danger:hover{background:var(--danger-bg);color:var(--danger);}

  /* 表示/編集トグル */
  #view-edit-toggle{flex:0 0 auto;display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
  .vet-btn{height:30px;padding:0 10px;font-size:12px;color:var(--ink-soft);background:transparent;transition:background .1s,color .1s;}
  .vet-btn.active{background:var(--accent);color:#f7f0e2;}

  #editor-area{flex:1 1 auto;overflow-y:auto;}
  #editor-inner{max-width:760px;margin:0 auto;padding:26px 34px 120px;}
  #title-input{width:100%;border:none;background:transparent;outline:none;font-size:27px;font-weight:600;letter-spacing:.02em;color:var(--ink);padding:0 0 8px;line-height:1.35;}
  #title-input::placeholder{color:var(--ink-faint);font-weight:600;}
  #title-rule{height:1px;background:var(--line-soft);margin:4px 0 18px;}

  /* 編集モード */
  #body-input{width:100%;border:none;background:transparent;outline:none;resize:none;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:15.5px;line-height:2.05;letter-spacing:.015em;color:var(--ink);min-height:60vh;overflow:hidden;}
  #body-input::placeholder{color:var(--ink-faint);}

  /* 表示モード（[[リンク]]をレンダリング） */
  #body-view{display:none;min-height:60vh;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:15.5px;line-height:2.05;letter-spacing:.015em;color:var(--ink);white-space:pre-wrap;word-break:break-word;}
  .wikilink{color:var(--link);background:var(--link-bg);border-radius:3px;padding:0 3px;
    text-decoration:none;cursor:pointer;font-size:14.5px;border-bottom:1px solid rgba(42,90,138,.3);}
  .wikilink:hover{background:#d4e4f4;}
  .wikilink.broken{color:var(--ink-faint);background:transparent;border-bottom:1px dashed var(--ink-faint);cursor:default;}

  #save-state{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));right:18px;z-index:30;font-size:11px;color:var(--ink-faint);letter-spacing:.05em;
    background:rgba(244,241,232,.88);padding:4px 10px;border-radius:20px;border:1px solid var(--line-soft);transition:opacity .4s;pointer-events:none;opacity:0;}

  #empty-state{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--ink-faint);text-align:center;padding:30px;}
  #empty-state .es-mark{font-size:40px;opacity:.5;}
  #empty-state .es-title{font-size:16px;color:var(--ink-soft);letter-spacing:.08em;}
  #empty-state .es-sub{font-size:12.5px;line-height:1.9;}

  /* ===== モーダル ===== */
  .overlay{position:fixed;inset:0;z-index:100;background:rgba(44,42,36,.4);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .18s;}
  .overlay.show{opacity:1;pointer-events:auto;}
  .modal{width:100%;max-width:440px;max-height:84vh;overflow:hidden;background:var(--paper-card);border-radius:12px;border:1px solid var(--line);box-shadow:0 18px 50px rgba(44,42,36,.3);display:flex;flex-direction:column;transform:translateY(8px) scale(.98);transition:transform .18s;}
  .overlay.show .modal{transform:none;}
  .modal h3{margin:0;padding:18px 22px 12px;font-size:16px;font-weight:600;letter-spacing:.06em;color:var(--ink);border-bottom:1px solid var(--line-soft);}
  .modal .m-body{padding:16px 22px;overflow-y:auto;font-size:13.5px;line-height:1.85;color:var(--ink-soft);}
  .modal .m-foot{padding:12px 22px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--line-soft);flex-wrap:wrap;}
  .m-btn{height:40px;padding:0 18px;border-radius:7px;font-size:13.5px;letter-spacing:.04em;border:1px solid var(--line);background:var(--paper);color:var(--ink);transition:filter .1s,transform .08s;}
  .m-btn:hover{filter:brightness(.97);}
  .m-btn:active{transform:translateY(1px);}
  .m-btn.primary{background:var(--accent);color:#f7f0e2;border-color:var(--accent);}
  .m-btn.danger{background:var(--danger);color:#f7eae7;border-color:var(--danger);}

  .move-list{display:flex;flex-direction:column;gap:2px;}
  .move-item{display:flex;align-items:center;gap:7px;width:100%;padding:9px 10px;border-radius:6px;font-size:13.5px;text-align:left;color:var(--ink);transition:background .1s;}
  .move-item:hover{background:var(--side-hover);}
  .move-item.disabled{color:var(--ink-faint);pointer-events:none;opacity:.5;}
  .move-item .mv-depth{color:var(--ink-faint);}
  .move-item.is-current{font-weight:600;}

  .trash-item{display:flex;align-items:center;gap:10px;padding:11px 8px;border-bottom:1px solid var(--line-soft);}
  .trash-item:last-child{border-bottom:none;}
  .trash-meta{flex:1 1 auto;min-width:0;}
  .trash-meta .tt{font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .trash-meta .ti{font-size:11px;color:var(--ink-faint);margin-top:2px;}
  .trash-acts{display:flex;gap:6px;flex:0 0 auto;}
  .trash-acts button{height:30px;padding:0 10px;border-radius:6px;font-size:12px;border:1px solid var(--line);background:var(--paper);}
  .trash-acts .restore:hover{background:#e3ecdd;color:var(--ok);border-color:#c2d3b8;}
  .trash-acts .purge:hover{background:var(--danger-bg);color:var(--danger);border-color:#e0bdb4;}

  .stor-line{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line-soft);}
  .stor-line:last-child{border-bottom:none;}
  .stor-line .k{color:var(--ink-soft);}
  .stor-line .v{color:var(--ink);}
  .badge{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;letter-spacing:.05em;}
  .badge.ok{background:#e3ecdd;color:var(--ok);}
  .badge.warn{background:#f4e6cf;color:#8a5a2b;}
  .hint-box{background:var(--paper);border:1px solid var(--line-soft);border-radius:8px;padding:11px 13px;margin-top:10px;font-size:12px;line-height:1.75;color:var(--ink-soft);}
  .hint-box b{color:var(--ink);}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:200;background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:24px;font-size:13px;letter-spacing:.04em;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .rename-input{flex:1 1 auto;min-width:0;margin:3px 4px 3px 0;height:26px;padding:0 6px;border-radius:5px;border:1px solid var(--accent-soft);background:#fff;font-size:13.5px;outline:none;}

  @media (max-width:760px){
    :root{--side-w:84vw;}
    #sidebar{position:fixed;z-index:50;left:0;top:0;bottom:0;transform:translateX(-100%);transition:transform .22s;box-shadow:6px 0 28px rgba(44,42,36,.18);max-width:340px;height:var(--app-h,100vh);}
    body.nav-open #sidebar{transform:translateX(0);}
    #side-foot{width:var(--side-w);max-width:340px;}
    #scrim{position:fixed;inset:0;z-index:45;background:rgba(44,42,36,.35);opacity:0;pointer-events:none;transition:opacity .2s;}
    body.nav-open #scrim{opacity:1;pointer-events:auto;}
    #btn-menu{display:flex;}
    #main{width:100%;}
    #editor-inner{padding:20px 18px 120px;}
    #title-input{font-size:23px;}
    #body-input,#body-view{font-size:16px;line-height:2;}
    #topbar .tb-btn .lbl{display:none;}
  }
  @media (min-width:761px){#scrim{display:none;}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="side-head"><span class="logo">知の階層メモ</span><span class="ver">v3.1</span></div>
    <div id="search-wrap">
      <input id="search-input" type="search" placeholder="🔍 検索…" autocomplete="off">
      <button id="search-clear" title="クリア">×</button>
    </div>
    <div id="search-results" style="display:none;"></div>
    <div id="tree-wrap"></div>
    <div id="side-foot">
      <button class="btn-new" id="btn-new-root">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>新規ページ
      </button>
      <button class="btn-icon-sq" id="btn-trash" title="ゴミ箱">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6"/></svg>
      </button>
      <button class="btn-icon-sq" id="btn-storage" title="保存とバックアップ">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M8 4v5h7"/></svg>
      </button>
    </div>
  </aside>
  <div id="scrim"></div>

  <main id="main">
    <div id="topbar">
      <button class="tb-btn" id="btn-menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div id="crumb"></div>
      <div id="view-edit-toggle">
        <button class="vet-btn active" id="btn-view-mode">表示</button>
        <button class="vet-btn" id="btn-edit-mode">編集</button>
      </div>
      <button class="tb-btn" id="btn-move" title="移動"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg><span class="lbl">移動</span></button>
      <button class="tb-btn" id="btn-add-child" title="子ページ"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg><span class="lbl">子ページ</span></button>
      <button class="tb-btn danger" id="btn-del" title="削除"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6"/></svg><span class="lbl">削除</span></button>
    </div>

    <div id="editor-area" style="display:none;">
      <div id="editor-inner">
        <input id="title-input" type="text" placeholder="無題" autocomplete="off">
        <div id="title-rule"></div>
        <textarea id="body-input" placeholder="ここに自由に書いてください…&#10;&#10;[[ページ名]] と書くと、そのページへのリンクになります。"></textarea>
        <div id="body-view"></div>
      </div>
    </div>

    <div id="empty-state">
      <div class="es-mark">❦</div>
      <div class="es-title">ページを選んでください</div>
      <div class="es-sub">左のツリーから選ぶか、「新規ページ」で始められます。</div>
    </div>
  </main>
</div>

<div id="save-state"></div>
<div id="toast"></div>

<div class="overlay" id="ov-move">
  <div class="modal"><h3>ページの移動先を選ぶ</h3>
    <div class="m-body" style="padding:10px 14px;"><div class="move-list" id="move-list"></div></div>
    <div class="m-foot"><button class="m-btn" data-close>閉じる</button></div></div>
</div>
<div class="overlay" id="ov-del">
  <div class="modal"><h3>ゴミ箱へ移しますか</h3>
    <div class="m-body" id="del-body"></div>
    <div class="m-foot"><button class="m-btn" data-close>やめる</button><button class="m-btn danger" id="del-confirm">ゴミ箱へ</button></div></div>
</div>
<div class="overlay" id="ov-trash">
  <div class="modal"><h3>ゴミ箱</h3>
    <div class="m-body" id="trash-body" style="padding:6px 16px;"></div>
    <div class="m-foot"><button class="m-btn danger" id="trash-empty" style="margin-right:auto;">すべて完全削除</button><button class="m-btn" data-close>閉じる</button></div></div>
</div>
<div class="overlay" id="ov-storage">
  <div class="modal"><h3>保存とバックアップ</h3>
    <div class="m-body" id="storage-body"></div>
    <div class="m-foot"><button class="m-btn" id="btn-import" style="margin-right:auto;">JSON読み込み</button><button class="m-btn primary" id="btn-export">JSON書き出し</button></div></div>
</div>
<div class="overlay" id="ov-confirm">
  <div class="modal"><h3 id="cf-title">確認</h3>
    <div class="m-body" id="cf-body"></div>
    <div class="m-foot"><button class="m-btn" data-close>やめる</button><button class="m-btn danger" id="cf-ok">実行する</button></div></div>
</div>

<input type="file" id="file-input" accept="application/json,.json" style="display:none;">

<script>
"use strict";
const DB_NAME='kaiso_memo_db',DB_VER=1,STORE='pages',APP_TAG='kaiso_memo';
let _db=null;
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=(e)=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        const os=db.createObjectStore(STORE,{keyPath:'id'});
        os.createIndex('parentId','parentId',{unique:false});
      }
    };
    req.onsuccess=()=>{_db=req.result;resolve(_db);};
    req.onerror=()=>reject(req.error);
  });
}
function tx(mode){return _db.transaction(STORE,mode).objectStore(STORE);}
function dbGetAll(){return new Promise((res,rej)=>{const r=tx('readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function dbPut(rec){return new Promise((res,rej)=>{const r=tx('readwrite').put(rec);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbBulkPut(recs){return new Promise((res,rej)=>{const t=_db.transaction(STORE,'readwrite'),os=t.objectStore(STORE);recs.forEach(r=>os.put(r));t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function dbBulkDelete(ids){return new Promise((res,rej)=>{const t=_db.transaction(STORE,'readwrite'),os=t.objectStore(STORE);ids.forEach(id=>os.delete(id));t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
function dbClearAll(){return new Promise((res,rej)=>{const r=tx('readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

let pages=[],currentId=null,collapsed=new Set();
let isEditMode=false; // false=表示モード, true=編集モード

function uid(){return 'p_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);}
function byId(id){return pages.find(p=>p.id===id)||null;}
function liveChildren(pid){return pages.filter(p=>p.parentId===pid&&!p.deletedAt).sort((a,b)=>(a.order-b.order)||(a.createdAt-b.createdAt));}

function isSelfOrDescendant(targetId,nodeId){
  if(targetId===nodeId)return true;
  let cur=byId(targetId),guard=0;
  while(cur&&cur.parentId!==null&&guard<10000){if(cur.parentId===nodeId)return true;cur=byId(cur.parentId);guard++;}
  return false;
}
function collectSubtree(id){
  const out=[id],stack=[id];let guard=0;
  while(stack.length&&guard<100000){const cur=stack.pop();pages.forEach(p=>{if(p.parentId===cur&&!p.deletedAt){out.push(p.id);stack.push(p.id);}});guard++;}
  return out;
}

/* ===== [[リンク]] レンダリング ===== */
function renderWikilinks(text){
  // ページタイトルのマップを作る（表示タイトル→id）
  const titleMap={};
  pages.filter(p=>!p.deletedAt).forEach(p=>{
    const t=displayTitle(p); if(t) titleMap[t]=p.id;
  });
  // [[...]] をリンクに変換（XSS対策: テキストはescapeHtml）
  const parts=text.split(/(\[\[[^\]]+\]\])/g);
  return parts.map(part=>{
    const m=part.match(/^\[\[(.+)\]\]$/);
    if(!m) return escapeHtml(part).replace(/\n/g,'<br>');
    const name=m[1].trim();
    const tid=titleMap[name];
    if(tid){
      return `<span class="wikilink" data-target="${escapeHtml(tid)}" title="${escapeHtml(name)}">📎${escapeHtml(name)}</span>`;
    } else {
      return `<span class="wikilink broken" title="ページが見つかりません">[[${escapeHtml(name)}]]</span>`;
    }
  }).join('');
}

/* ===== 表示/編集モード切り替え ===== */
function setMode(edit){
  isEditMode=edit;

/* ===== ページ操作 ===== */
async function createPage(parentId){
  const now=Date.now();
  const sibs=liveChildren(parentId);
  const maxOrder=sibs.reduce((m,s)=>Math.max(m,s.order||0),0);
  const rec={id:uid(),parentId:parentId||null,title:'',body:'',order:maxOrder+1,createdAt:now,updatedAt:now,deletedAt:null};
  pages.push(rec);await dbPut(rec);
  if(parentId)collapsed.delete(parentId);
  currentId=rec.id;renderTree();openEditor(rec.id,true);
}
async function softDelete(id){
  const ids=collectSubtree(id);const now=Date.now();const changed=[];
  ids.forEach(pid=>{const p=byId(pid);if(p&&!p.deletedAt){p.deletedAt=now;p.updatedAt=now;changed.push(p);}});
  await dbBulkPut(changed);
  if(ids.includes(currentId)){currentId=null;showEmpty();}
  renderTree();toast(changed.length>1?`${changed.length}件をゴミ箱へ移しました`:'ゴミ箱へ移しました');
}
async function restorePage(id){
  const p=byId(id);if(!p)return;
  const parent=p.parentId?byId(p.parentId):null;
  if(p.parentId&&(!parent||parent.deletedAt))p.parentId=null;
  p.deletedAt=null;p.updatedAt=Date.now();
  await dbPut(p);renderTree();renderTrash();toast('復元しました');
}
async function purgePage(id){
  const targets=[],stack=[id];let guard=0;
  while(stack.length&&guard<100000){const cur=stack.pop();targets.push(cur);pages.forEach(p=>{if(p.parentId===cur)stack.push(p.id);});guard++;}
  await dbBulkDelete(targets);
  pages=pages.filter(p=>!targets.includes(p.id));
  renderTrash();renderTree();
}
async function emptyTrash(){
  const ids=pages.filter(p=>p.deletedAt).map(p=>p.id);
  await dbBulkDelete(ids);
  pages=pages.filter(p=>!p.deletedAt);
  renderTrash();renderTree();toast('ゴミ箱を空にしました');
}
async function movePage(id,newParentId){
  if(newParentId!==null&&isSelfOrDescendant(newParentId,id)){toast('そこへは移動できません');return;}
  const p=byId(id);if(!p)return;
  const sibs=liveChildren(newParentId).filter(s=>s.id!==id);
  const maxOrder=sibs.reduce((m,s)=>Math.max(m,s.order||0),0);
  p.parentId=newParentId;p.order=maxOrder+1;p.updatedAt=Date.now();
  await dbPut(p);
  if(newParentId)collapsed.delete(newParentId);
  renderTree();toast('移動しました');
}

let saveTimer=null,saveStateTimer=null;

/* ===== 検索 ===== */
const searchInput=document.getElementById('search-input');
const searchClear=document.getElementById('search-clear');
const searchResults=document.getElementById('search-results');
let searchTimer=null;

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim();
  searchClear.classList.toggle('show',q.length>0);
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>doSearch(q),200);
});
searchClear.onclick=()=>{
  searchInput.value='';searchClear.classList.remove('show');
  hideSearch();
};

function doSearch(q){
  if(!q){hideSearch();return;}
  const kw=q.toLowerCase();
  const hits=pages.filter(p=>!p.deletedAt).filter(p=>{
    const t=(p.title||'').toLowerCase();
    const b=(p.body||'').toLowerCase();
    return t.includes(kw)||b.includes(kw);
  });
  searchResults.style.display='';
  document.getElementById('tree-wrap').style.display='none';
  if(hits.length===0){
    searchResults.innerHTML=`<div class="sr-empty">「${escapeHtml(q)}」に一致するページはありません</div>`;
    return;
  }
  searchResults.innerHTML='';
  hits.forEach(p=>{
    const div=document.createElement('div');div.className='sr-item';
    const titleRaw=displayTitle(p)||'無題';
    const bodyRaw=(p.body||'');
    // スニペット：キーワード周辺30文字
    const bLower=bodyRaw.toLowerCase();
    const idx=bLower.indexOf(q.toLowerCase());
    let snippet='';
    if(idx>=0){
      const start=Math.max(0,idx-15);
      const end=Math.min(bodyRaw.length,idx+q.length+15);
      snippet=(start>0?'…':'')+bodyRaw.slice(start,end)+(end<bodyRaw.length?'…':'');
    } else {
      snippet=bodyRaw.slice(0,50)+(bodyRaw.length>50?'…':'');
    }
    div.innerHTML=`<div class="sr-title">${highlight(escapeHtml(titleRaw),escapeHtml(q))}</div>`
      +(snippet?`<div class="sr-snippet">${highlight(escapeHtml(snippet),escapeHtml(q))}</div>`:'');
    div.onclick=()=>{
      openEditor(p.id);
      // 検索をクリア
      searchInput.value='';searchClear.classList.remove('show');hideSearch();
      document.body.classList.remove('nav-open');
    };
    searchResults.appendChild(div);
  });
}
function highlight(html,kw){
  if(!kw)return html;
  const re=new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return html.replace(re,m=>`<span class="sr-hit">${m}</span>`);
}
function hideSearch(){
  searchResults.style.display='none';
  document.getElementById('tree-wrap').style.display='';
}

/* ===== ツリー描画 ===== */
const treeWrap=document.getElementById('tree-wrap');
function displayTitle(p){
  const t=(p.title||'').trim();if(t)return t;
  const firstLine=(p.body||'').split('\n').find(l=>l.trim());
  if(firstLine)return firstLine.trim();
  return null;
}
function renderTree(){
  const roots=liveChildren(null);
  if(roots.length===0){treeWrap.innerHTML='<div class="empty-hint">まだページがありません。<br>下の「新規ページ」から<br>始めてください。</div>';return;}
  treeWrap.innerHTML='';roots.forEach(r=>treeWrap.appendChild(buildNode(r,0)));
}
function buildNode(p,depth){
  const frag=document.createDocumentFragment();
  const kids=liveChildren(p.id),hasKids=kids.length>0,isCol=collapsed.has(p.id);
  const row=document.createElement('div');
  row.className='node-row'+(p.id===currentId?' active':'')+(isCol?' collapsed':'');
  row.dataset.id=p.id;row.style.paddingLeft=(depth*15)+'px';row.draggable=true;
  const tw=document.createElement('div');
  tw.className='twist'+(hasKids?'':' empty');
  tw.innerHTML='<svg width="9" height="9" viewBox="0 0 12 12" fill="currentColor"><path d="M3 2l5 4-5 4z"/></svg>';
  tw.onclick=(e)=>{e.stopPropagation();if(!hasKids)return;if(isCol)collapsed.delete(p.id);else collapsed.add(p.id);renderTree();};
  row.appendChild(tw);
  const dt=displayTitle(p);
  const tt=document.createElement('div');
  tt.className='node-title'+(dt?'':' untitled');tt.textContent=dt||'無題';
  tt.onclick=()=>openEditor(p.id);
  row.appendChild(tt);
  const mini=document.createElement('div');mini.className='node-mini';
  const bAdd=document.createElement('button');bAdd.title='子ページを追加';
  bAdd.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>';
  bAdd.onclick=(e)=>{e.stopPropagation();createPage(p.id);};
  const bRen=document.createElement('button');bRen.title='名前を変える';
  bRen.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
  bRen.onclick=(e)=>{e.stopPropagation();inlineRename(row,p);};
  mini.appendChild(bAdd);mini.appendChild(bRen);row.appendChild(mini);
  row.addEventListener('dragstart',(e)=>{e.dataTransfer.setData('text/plain',p.id);e.dataTransfer.effectAllowed='move';});
  row.addEventListener('dragover',(e)=>{e.preventDefault();row.classList.add('drop-target');});
  row.addEventListener('dragleave',()=>row.classList.remove('drop-target'));
  row.addEventListener('drop',(e)=>{e.preventDefault();row.classList.remove('drop-target');const d=e.dataTransfer.getData('text/plain');if(d&&d!==p.id)movePage(d,p.id);});
  frag.appendChild(row);
  if(hasKids&&!isCol)kids.forEach(k=>frag.appendChild(buildNode(k,depth+1)));
  return frag;
}
function updateTreeTitle(id,p){
  const el=treeWrap.querySelector(`.node-row[data-id="${id}"] .node-title`);
  if(!el){renderTree();return;}
  const dt=displayTitle(p);el.textContent=dt||'無題';
  el.className='node-title'+(dt?'':' untitled');
}
function inlineRename(row,p){
  const titleEl=row.querySelector('.node-title');
  const input=document.createElement('input');
  input.className='rename-input';input.value=p.title||'';input.placeholder='無題';
  titleEl.replaceWith(input);input.focus();input.select();
  const commit=async()=>{p.title=input.value.trim();p.updatedAt=Date.now();await dbPut(p);if(p.id===currentId)titleInput.value=p.title;renderTree();};
  input.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();input.blur();}if(e.key==='Escape')renderTree();});
  input.addEventListener('blur',commit);
}

function autoGrow(){bodyInput.style.height='auto';bodyInput.style.height=bodyInput.scrollHeight+'px';}

function openEditor(id,focusTitle){
  const p=byId(id);if(!p||p.deletedAt){showEmpty();return;}
  currentId=id;
  editorArea.style.display='block';emptyState.style.display='none';
  titleInput.value=p.title||'';bodyInput.value=p.body||'';autoGrow();
  // 新規作成時は編集モード、既存ページは表示モードで開く
  if(focusTitle){
    setMode(true);setTimeout(()=>titleInput.focus(),50);
  } else {
    setMode(false);
  }
  renderCrumb(p);renderTree();
  document.body.classList.remove('nav-open');
  editorArea.scrollTop=0;
}
function showEmpty(){currentId=null;editorArea.style.display='none';emptyState.style.display='flex';crumb.textContent='';}
function renderCrumb(p){
  const chain=[];let cur=p,guard=0;
  while(cur&&guard<10000){chain.unshift(cur);cur=cur.parentId?byId(cur.parentId):null;guard++;}
  crumb.innerHTML=chain.map((n,i)=>{
    const safe=escapeHtml(displayTitle(n)||'無題');
    if(i===chain.length-1)return `<span class="cur">${safe}</span>`;
    return `<span class="cr" data-id="${n.id}" style="cursor:pointer">${safe}</span><span class="sep">›</span>`;
  }).join('');
  crumb.querySelectorAll('.cr').forEach(el=>el.onclick=()=>openEditor(el.dataset.id));
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

titleInput.addEventListener('input',scheduleSave);

const moveList=document.getElementById('move-list');
function openMove(){
  if(!currentId){toast('先にページを開いてください');return;}
  const p=byId(currentId);moveList.innerHTML='';
  const rootBtn=document.createElement('button');
  rootBtn.className='move-item'+(p.parentId===null?' is-current disabled':'');
  rootBtn.innerHTML='<span>▸ 最上位（ルート）へ</span>';
  rootBtn.onclick=()=>{if(p.parentId!==null){movePage(currentId,null);closeOv('ov-move');}};
  moveList.appendChild(rootBtn);
  const ordered=[];
  (function walk(pid,depth){liveChildren(pid).forEach(c=>{ordered.push({node:c,depth});walk(c.id,depth+1);});})(null,0);
  ordered.forEach(({node,depth})=>{
    const forbidden=isSelfOrDescendant(node.id,currentId);
    const isParentNow=node.id===p.parentId;
    const item=document.createElement('button');
    item.className='move-item'+(forbidden?' disabled':'')+(isParentNow?' is-current':'');
    const indent='　'.repeat(depth);
    const dt=escapeHtml(displayTitle(node)||'無題');
    item.innerHTML=`<span class="mv-depth">${indent}└</span><span>${dt}${isParentNow?'（現在の親）':''}</span>`;
    if(!forbidden)item.onclick=()=>{movePage(currentId,node.id);closeOv('ov-move');};
    moveList.appendChild(item);
  });
  openOv('ov-move');
}

    :`「<b>${name}</b>」をゴミ箱へ移します。<br><span style="color:var(--ok)">ゴミ箱からいつでも復元できます。</span>`;

const trashBody=document.getElementById('trash-body');

const storageBody=document.getElementById('storage-body');
async function renderStorage(){
  const live=pages.filter(p=>!p.deletedAt).length;
  const trash=pages.filter(p=>p.deletedAt).length;
  let persisted=false,quota='—',usage='—';
  try{
    if(navigator.storage&&navigator.storage.persisted)persisted=await navigator.storage.persisted();
    if(navigator.storage&&navigator.storage.estimate){const est=await navigator.storage.estimate();if(est.usage!=null)usage=fmtBytes(est.usage);if(est.quota!=null)quota=fmtBytes(est.quota);}
  }catch(e){}
  const last=localStorage.getItem('kaiso_last_backup');
  const lastTxt=last?daysAgo(parseInt(last,10)):'<span style="color:var(--ink-faint)">まだありません（自動保存は有効です）</span>';
  storageBody.innerHTML=`
    <div class="stor-line"><span class="k">ページ数</span><span class="v">${live} 件</span></div>
    <div class="stor-line"><span class="k">ゴミ箱</span><span class="v">${trash} 件</span></div>
    <div class="stor-line"><span class="k">データ保護</span><span class="v">${persisted?'<span class="badge ok">有効</span>':'<span class="badge warn">未確定</span>'}</span></div>
    <div class="stor-line"><span class="k">使用量 / 上限</span><span class="v">${usage} / ${quota}</span></div>
    <div class="stor-line"><span class="k">前回のJSON控え</span><span class="v">${lastTxt}</span></div>
    <div class="hint-box">通常は<b>自動保存</b>されるので操作は不要です。<br>機種変更などに備えて、ときどき「JSON書き出し」で控えを取っておくとより安心です。</div>`;
}
function fmtBytes(b){if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(2)+' GB';}
function daysAgo(ts){const d=Math.floor((Date.now()-ts)/86400000);if(d<=0)return '今日';if(d===1)return '1日前';if(d<=7)return d+'日前';return `<span style="color:var(--danger)">${d}日前</span>`;}

}
const fileInput=document.getElementById('file-input');
document.getElementById('btn-export').onclick=exportJSON;
document.getElementById('btn-import').onclick=()=>{
  askConfirm('JSONを読み込みますか',
    `JSONを読み込むと、<b>いまの内容はすべて置き換わります</b>。<br>念のため、読み込み前にいまのデータを自動で書き出します。`,
    ()=>{if(pages.length)exportJSONSilent();fileInput.value='';fileInput.click();});
};
fileInput.addEventListener('change',(e)=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data||data.app!==APP_TAG||!Array.isArray(data.pages)){toast('このアプリのバックアップではないようです');return;}
      const clean=data.pages.map(p=>({
        id:p.id||uid(),parentId:(p.parentId===undefined?null:p.parentId),
        title:typeof p.title==='string'?p.title:'',body:typeof p.body==='string'?p.body:'',
        order:typeof p.order==='number'?p.order:0,
        createdAt:p.createdAt||Date.now(),updatedAt:p.updatedAt||Date.now(),deletedAt:p.deletedAt||null
      }));
      const idset=new Set(clean.map(p=>p.id));
      clean.forEach(p=>{if(p.parentId&&!idset.has(p.parentId))p.parentId=null;});
      await dbClearAll();await dbBulkPut(clean);
      pages=clean;currentId=null;collapsed.clear();
      showEmpty();renderTree();renderStorage();closeOv('ov-storage');
      toast(`${clean.filter(p=>!p.deletedAt).length}件を読み込みました`);
    }catch(err){toast('読み込みに失敗しました（ファイルが壊れている可能性）');}
  };
  reader.readAsText(file);
});

let cfCallback=null;
function askConfirm(title,html,cb){
  document.getElementById('cf-title').textContent=title;
  document.getElementById('cf-body').innerHTML=html;
  cfCallback=cb;openOv('ov-confirm');
}
document.getElementById('cf-ok').onclick=()=>{closeOv('ov-confirm');const cb=cfCallback;cfCallback=null;if(cb)cb();};

let toastTimer=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

/* ===== ボタン結線 ===== */
document.getElementById('btn-new-root').onclick=()=>createPage(null);
document.getElementById('btn-add-child').onclick=()=>{if(currentId)createPage(currentId);else createPage(null);};
document.getElementById('btn-del').onclick=openDel;
document.getElementById('btn-move').onclick=openMove;
document.getElementById('btn-trash').onclick=()=>{renderTrash();openOv('ov-trash');};
document.getElementById('btn-storage').onclick=()=>{renderStorage();openOv('ov-storage');};
document.getElementById('btn-menu').onclick=()=>document.body.classList.toggle('nav-open');
document.getElementById('scrim').onclick=()=>document.body.classList.remove('nav-open');

document.getElementById('btn-edit-mode').onclick=()=>setMode(true);

/* ===== Android キーボード対策：高さをCSS変数で固定 ===== */
function fixAppHeight(){
  // キーボードが出ても画面が押し上げられないよう、
  // 起動時の実高さを --app-h に固定してCSSで使う
  const h = window.innerHeight;
  document.documentElement.style.setProperty('--app-h', h + 'px');
}
// 起動時に1回だけ固定（リサイズは無視 = キーボード出ても動かない）
fixAppHeight();
// PC用：ウィンドウリサイズ時だけ更新（スマホのキーボードによるリサイズは無視）
let lastW = window.innerWidth;
window.addEventListener('resize', () => {
  if(window.innerWidth !== lastW){ // 幅が変わったときだけ（= PCのウィンドウリサイズ）
    lastW = window.innerWidth;
    fixAppHeight();
  }
});

/* ===== 起動 ===== */
async function boot(){
  try{await openDB();}
  catch(e){document.body.innerHTML='<div style="padding:40px;font-family:sans-serif;color:#9a3b2e;">この端末ではデータベースを開けませんでした。プライベートブラウズを解除するか、別のブラウザでお試しください。</div>';return;}
  try{if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist();}catch(e){}
  pages=await dbGetAll();
  if(pages.length===0){
    const now=Date.now();
    const welcome={id:uid(),parentId:null,title:'ようこそ',
      body:'このメモは自動で保存されます。\n\n■ 検索\nサイドバー上部の検索窓にキーワードを入力すると、タイトルと本文をリアルタイムで検索できます。\n\n■ ページ間ジャンプ\n本文に [[ページ名]] と書くと、青いリンクになります。\n表示モードでタップするとそのページへ飛べます。\nページ名を変更するとリンクは切れますのでご注意ください。\n\n■ 表示/編集\nページを開くと「表示モード」になります。\n編集するときは右上の「編集」ボタンを押してください。\n\nこのページは消してもらってかまいません。',
      order:1,createdAt:now,updatedAt:now,deletedAt:null};
    pages.push(welcome);await dbPut(welcome);
  }
  renderTree();showEmpty();
}
boot();
</script>
